dataset:
  baseline:
      centrality_betweenness:
          HYGENE: 0.00044
      centrality_closeness:
          HYGENE: 0.016
      centrality_harmonic:
          HYGENE: 2.99
      edge_size_wasserstein:
          HYGENE: 0.002
          HyperPLR: 0
      is_sbm:
          HYGENE: 0.65
          HyperPLR: 0
      node_degree_wasserstein:
          HYGENE: 0.321
          HyperPLR: 0.661
      spectral:
          HYGENE: 0.01
          HyperPLR: 0.016
  change_rate: 0.5
  clique_loss_coef: null
  data_augmentation: false
  datadir: data/sbm_custom128x1_32_40_l6_flexible_num_nodes/
  model_type: MultiLayerXEyTransformer
  multilabel: true
  name: sbm_custom
  num_graphs: sbm_custom128x1_32_40_l6_flexible_num_nodes
  num_layers: 6
  post_processing: null
  remove_h: null
  samples_per_epoch: 128


general:
  chains_to_save: 1
  check_val_every_n_epochs: 50
  detect_anomaly: false
  evaluate_all_checkpoints: false
  final_model_chains_to_save: 1
  final_model_samples_to_generate: 1000
  final_model_samples_to_save: 2
  gpus: 1
  log_every_steps: 50
  name: graph-tf-model
  number_chain_steps: 1
  resume: null
  sample_every_val: 20
  samples_to_generate: 200
  samples_to_save: 20
  test_only: "home/ubuntu/hypergraph-generation/checkpoints/sbm_no_extra_feat.ckpt"
  val_check_interval: null
  wandb: online
  metrics: ['node_degree', 'edge_size', 'spectral', 'is_sbm', 'clique_size', 'uniqueness', 'novelty', 'nb_nodes', 'centrality_closeness', 'centrality_betweenness', 'centrality_harmonic']


model:
  diffusion_noise_schedule: cosine
  diffusion_steps: 500
  extra_features: null
  hidden_dims:
      dX: 512
      dY: 256
      de: 256
      dim_ffX_Xx: 1024
      dim_ffX_YX: 1024
      dim_ffX_concat: 2048
      dim_ffY_YX: 512
      dim_ffY_Yy: 512
      dim_ffY_concat: 1024
      dim_ffe_concat: 512
      dim_ffe_xey: 512
      dim_ffx_Xx: 1024
      dim_ffx_concat: 1024
      dim_ffx_xey: 1024
      dim_ffy_Yy: 256
      dim_ffy_concat: 512
      dim_ffy_xey: 256
      dx: 512
      dy: 128
      n_head_Xx: 16
      n_head_YX: 16
      n_head_Yy: 16
      n_head_xey: 16
  hidden_mlp_dims:
      X: 1024
      "Y": 512
      e: 512
      x: 1024
      "y": 256
  kernel_coef: null
  lambda_train:
      - 5
      - 0
      - 1
      - 0
  model: graph_tf
  model_type: GraphSuperpositionTransformerv2
  n_layers: 5
  parallel_model: false
  single_layer: false
  transition: marginal
  triplet_interactions: aggregation
  type: discrete


train:
  batch_size: 32
  clip_grad: 1
  display_memory_summary: false
  ema_decay: 0.999
  lr: 0.0001
  n_epochs: 30000
  num_workers: 0
  optimizer: nadamw
  progress_bar: true
  save_model: true
  scheduler: null
  seed: 0
  weight_BCE: 1
  weight_decay: 1e-12


tuning:
  find_optimal_lr: true
  find_optimal_lr_augmentation: false
  find_optimal_params: false
  max_lr: 0.01
  name: tuning_default
