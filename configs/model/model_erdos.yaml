# Model settings
type: 'discrete'
transition: 'marginal'                          # uniform or marginal
model: 'graph_tf'
diffusion_steps: 500
# diffusion_steps: 10
diffusion_noise_schedule: 'cosine'              # 'cosine', 'polynomial_2'
n_layers: 5

extra_features: 'cliques'        # 'cliques' or null
clique_sizes: [3, 4]
extra_features_algorithm: 'parallel'

model_type: 'GraphSuperpositionTransformerv2'
parallel_model: false
kernel_coef: null
triplet_interactions: 'aggregation'
single_layer: false




# The dimensions should satisfy dx % n_head == 0
# hidden_dims : {'dx': 256, 'de': 64, 'dy': 64, 'n_head': 8, 'dim_ffX': 256, 'dim_ffE': 128, 'dim_ffy': 128}

# For the graphs with several layers
# hidden_mlp_dims: {'X': 512, 'Y': 256, 'e': 128, 'x':256, 'y': 256}

