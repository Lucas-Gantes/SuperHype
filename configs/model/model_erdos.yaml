# Even denser network
hidden_mlp_dims: {'X': 1024, 'Y': 512, 'e': 512, 'x':1024, 'y': 256}
hidden_dims : {'dX': 512, 'dY': 256, 'de': 256, 'dx': 512, 'dy': 128,
               'n_head_xey': 16, 'n_head_Xx': 16, 'n_head_Yy': 16, 'n_head_YX': 16,
               'dim_ffx_xey': 1024, 'dim_ffe_xey': 512, 'dim_ffy_xey': 256, 
               'dim_ffX_concat': 2048, 'dim_ffx_concat': 1024, 'dim_ffe_concat': 512, 
               'dim_ffY_concat': 1024, 'dim_ffy_concat': 512,
               'dim_ffX_Xx': 1024, 'dim_ffx_Xx': 1024,
               'dim_ffY_Yy': 512, 'dim_ffy_Yy': 256, 
               'dim_ffY_YX': 512, 'dim_ffX_YX': 1024}

