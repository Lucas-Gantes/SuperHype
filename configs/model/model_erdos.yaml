# Denser network
# hidden_mlp_dims: {'X': 1024, 'Y': 512, 'e': 256, 'x':512, 'y': 256}
# hidden_dims : {'dX': 512, 'dY': 256, 'de': 128, 'dx': 256, 'dy': 128,
#                'n_head_xey': 16, 'n_head_Xx': 16, 'n_head_Yy': 16, 'n_head_YX': 16,
