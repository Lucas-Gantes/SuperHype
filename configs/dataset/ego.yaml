  edge_size_wasserstein:
    HYGENE: 0.027
  spectral:
    HYGENE: 0.034
  centrality_closeness:
    HYGENE: 0.263
  centrality_betweenness:
    HYGENE: 0.009
  centrality_harmonic:
    HYGENE: 197.1
  